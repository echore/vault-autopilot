name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "npm"

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Package zip
        run: |
          mkdir vault-autopilot
          cp main.js manifest.json vault-autopilot/
          zip -r vault-autopilot.zip vault-autopilot

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            main.js manifest.json vault-autopilot.zip
